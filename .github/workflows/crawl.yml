name: Crawl Kakao Gift Food Ranking

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 실행 (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          python -m playwright install --with-deps chromium

      # 이전 스냅샷 백업
      - name: Backup previous ranking
        run: |
          mkdir -p /tmp/kakao_rank
          if [ -f docs/data/food_ranking.json ]; then
            cp docs/data/food_ranking.json /tmp/kakao_rank/prev.json
          else
            echo '{"items":[]}' > /tmp/kakao_rank/prev.json
          fi

      # 카카오 랭킹 크롤링
      - name: Run crawler
        run: |
          python crawler/crawl_food.py

      # 카테고리 분석
      - name: Category radar
        run: |
          python crawler/category_radar.py

      # 텔레그램 리포트 (항상 전송)
      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json, os, urllib.parse, urllib.request

          food="docs/data/food_ranking.json"
          cat="docs/data/category_snapshot.json"

          fetched="-"
          items=0
          cats=[]
          deltas=[]

          try:
            with open(food,"r",encoding="utf-8") as f:
              d=json.load(f)
              fetched=d.get("fetched_at","-")
              items=len(d.get("items") or [])
          except:
            pass

          try:
            with open(cat,"r",encoding="utf-8") as f:
              c=json.load(f)
              cc=c.get("category_counts") or {}
              dd=c.get("category_deltas_vs_prev") or {}

              cats=sorted(cc.items(), key=lambda x: x[1], reverse=True)[:5]

              for k,v in dd.items():
                if v!=0:
                  deltas.append((k,v))
          except:
            pass

          msg="📊 카카오 식품 랭킹 리포트\n"
          msg+=f"- items: {items}\n"
          msg+=f"- fetched_at: {fetched}\n\n"

          if cats:
            msg+="📦 Top 카테고리\n"
            for k,v in cats:
              msg+=f"- {k}: {v}\n"

          if deltas:
            msg+="\n📈 카테고리 변화\n"
            for k,v in sorted(deltas,key=lambda x:abs(x[1]),reverse=True)[:5]:
              sign="+" if v>0 else ""
              msg+=f"- {k}: {sign}{v}\n"

          repo=os.environ.get("GITHUB_REPOSITORY","")
          run=os.environ.get("GITHUB_RUN_ID","")
          if repo and run:
            msg+=f"\n🔗 https://github.com/{repo}/actions/runs/{run}"

          token=os.environ["TELEGRAM_BOT_TOKEN"]
          chat=os.environ["TELEGRAM_CHAT_ID"]

          url=f"https://api.telegram.org/bot{token}/sendMessage"
          data=urllib.parse.urlencode({
            "chat_id":chat,
            "text":msg
          }).encode()

          urllib.request.urlopen(urllib.request.Request(url,data=data,method="POST"),timeout=20)
          PY

      # 변경 커밋
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/data/*.json docs/data/*.ndjson || true

          git diff --cached --quiet || (
            git commit -m "update ranking data"
            git push
          )
