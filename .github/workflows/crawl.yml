name: Crawl Kakao Gift Food Ranking

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 정각 (UTC). KST=UTC+9
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Backup previous snapshot
        run: |
          mkdir -p /tmp/kakao_rank
          if [ -f docs/data/food_ranking.json ]; then
            cp docs/data/food_ranking.json /tmp/kakao_rank/prev.json
          else
            echo '{"items":[]}' > /tmp/kakao_rank/prev.json
          fi

      - name: Run crawler
        run: |
          python crawler/crawl_food.py

      - name: Category radar (Top100 distribution)
        run: |
          python crawler/category_radar.py

      # ✅ 변동 요약을 텍스트로 받아서 OUTPUT으로 저장
      - name: Build ranking diff text
        id: difftxt
        run: |
          echo "text<<EOF" >> $GITHUB_OUTPUT
          python crawler/notify_telegram.py /tmp/kakao_rank/prev.json docs/data/food_ranking.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ 매시간 딱 1번만 텔레그램 전송 (카테고리 + 변동요약 합침)
      - name: Send Telegram (single combined report)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIFF_TEXT: ${{ steps.difftxt.outputs.text }}
        run: |
          python - <<'PY'
          import os, json, urllib.parse, urllib.request

          food_path="docs/data/food_ranking.json"
          cat_path="docs/data/category_snapshot.json"
          diff_text=os.environ.get("DIFF_TEXT","").strip()

          fetched="-"
          n=0
          cat_top=[]
          cat_delta=[]

          try:
            with open(food_path,"r",encoding="utf-8") as f:
              d=json.load(f)
            fetched=d.get("fetched_at","-")
            n=len(d.get("items") or [])
          except Exception:
            pass

          try:
            with open(cat_path,"r",encoding="utf-8") as f:
              c=json.load(f)
            cc=c.get("category_counts") or {}
            dd=c.get("category_deltas_vs_prev") or {}
            cat_top=sorted(cc.items(), key=lambda x: x[1], reverse=True)[:7]
            cat_delta=sorted([(k,v) for k,v in dd.items() if v!=0], key=lambda x: abs(x[1]), reverse=True)[:7]
          except Exception:
            pass

          repo=os.environ.get("GITHUB_REPOSITORY","")
          run_id=os.environ.get("GITHUB_RUN_ID","")

          msg = "⏱️ 카카오 식품 랭킹 · 시간별 리포트\\n"
          msg += f"- items: {n}\\n"
          msg += f"- fetched_at: {fetched}\\n"

          if cat_top:
            msg += "\\n📦 Top100 카테고리 분포\\n"
            for k,v in cat_top:
              msg += f"- {k}: {v}\\n"

          if cat_delta:
            msg += "\\n📈 카테고리 변화(직전 대비)\\n"
            for k,v in cat_delta:
              msg += f"- {k}: {v:+d}\\n"

          msg += "\\n📌 순위 변화 요약\\n"
          msg += (diff_text if diff_text else "변동 없음")

          if repo and run_id:
            msg += f"\\n\\n🔗 https://github.com/{repo}/actions/runs/{run_id}"

          token=os.environ["TELEGRAM_BOT_TOKEN"]
          chat=os.environ["TELEGRAM_CHAT_ID"]
          url=f"https://api.telegram.org/bot{token}/sendMessage"
          data=urllib.parse.urlencode({
            "chat_id":chat,
            "text":msg,
            "disable_web_page_preview":"true"
          }).encode()

          urllib.request.urlopen(urllib.request.Request(url,data=data,method="POST"),timeout=20).read()
          PY

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/food_ranking.json docs/data/food_history.ndjson docs/data/debug || true
          git add docs/data/category_snapshot.json docs/data/category_timeseries.ndjson || true
          git diff --cached --quiet || (git commit -m "Update food ranking" && git push)
