name: Crawl Kakao + Naver Food Radar

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 정각 (UTC). KST=UTC+9
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          python -m playwright install --with-deps chromium

      # 1) Kakao (existing)
      - name: Backup previous Kakao snapshot
        run: |
          mkdir -p /tmp/kakao_rank
          if [ -f docs/data/food_ranking.json ]; then
            cp docs/data/food_ranking.json /tmp/kakao_rank/prev.json
          else
            echo '{"items":[]}' > /tmp/kakao_rank/prev.json
          fi

      - name: Crawl Kakao food ranking
        run: |
          python crawler/crawl_food.py

      - name: Notify Telegram if Kakao ranking changed (diff summary)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python crawler/notify_telegram.py /tmp/kakao_rank/prev.json docs/data/food_ranking.json

      # 2) Naver Food Click Best (new)
      - name: Crawl Naver food click best
        run: |
          python crawler/crawl_naver_food_click_best.py

      # 3) Keyword radar (new)
      - name: Keyword radar (spike alert)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python crawler/keyword_radar.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/food_ranking.json docs/data/food_history.ndjson docs/data/debug || true
          git add docs/data/naver_food_click_best.json docs/data/keyword_latest.json docs/data/keyword_timeseries.ndjson || true
          git diff --cached --quiet || (git commit -m "Update food radar" && git push)
