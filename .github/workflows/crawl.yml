name: Crawl Kakao Gift Food Ranking

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 정각 (UTC). KST=UTC+9
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          python -m playwright install --with-deps chromium

      # ✅ 이전 스냅샷 백업 (비교용)
      - name: Backup previous snapshot
        run: |
          mkdir -p /tmp/kakao_rank
          if [ -f docs/data/food_ranking.json ]; then
            cp docs/data/food_ranking.json /tmp/kakao_rank/prev.json
          else
            echo '{"items":[]}' > /tmp/kakao_rank/prev.json
          fi

      - name: Run crawler
        run: |
          python crawler/crawl_food.py

      # ✅ 업그레이드: 변동 요약 텔레그램 알림 (변동 있을 때만)
      - name: Notify Telegram if changed (with diff summary)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python crawler/notify_telegram.py /tmp/kakao_rank/prev.json docs/data/food_ranking.json

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/food_ranking.json docs/data/food_history.ndjson docs/data/debug || true
          git diff --cached --quiet || (git commit -m "Update food ranking" && git push)
